name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  basic:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Show repo structure
        run: |
          pwd
          find . -maxdepth 3 -type f | sort
      - name: Placeholder validation
        run: |
          test -f README.md
          test -f LICENSE
          test -f docs/architecture/overview.md
          test -f src/main.ts
