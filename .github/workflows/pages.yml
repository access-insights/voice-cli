name: Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-pages:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build static site
        run: |
          mkdir -p .site
          cp website/index.html .site/index.html
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: voice-cli-pages
          path: .site
