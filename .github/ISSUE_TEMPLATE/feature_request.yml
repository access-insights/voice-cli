name: Feature request
description: Suggest an enhancement for voice-cli
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: User problem
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
  - type: textarea
    id: accessibility
    attributes:
      label: Accessibility considerations
